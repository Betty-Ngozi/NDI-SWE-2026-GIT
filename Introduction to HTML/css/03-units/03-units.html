<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./03-units.css">
    <title>Document</title>
</head>
<body>
    <main>
        <h1>CSS Units</h1>
        <dl>
            <dt>Absolute units</dt>
            <dd>Used for fixed ,easurements relative to other elements. eg:<strong>px,cm,nn,in,pt,pc</strong></dd>
            <dt>Relative units</dt>
            <dd>Used for measurements relative to other element. eg: <strong> em,rem,%, vh, vw, dvh, Ivh, svh, vmin, vmax, fr, ch</strong></dd>
        </dl>
       <section>
        <fieldset>
            <legend>Px Unit</legend>
            <div id="px-abs-unit"></div>
        </fieldset>
        <fieldset>
            <legend>Cm unit</legend>
           <div id="cm-abs-unit">
            CM Box
           </div>
               
        </fieldset>
       </section>
    </main>
</body>
</html>
